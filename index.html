function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function fB(n){if(n>=1e12)return (n/1e12).toFixed(2)+'T';if(n>=1e9)return (n/1e9).toFixed(2)+'G';if(n>=1e6)return (n/1e6).toFixed(2)+'M';if(n>=1e3)return (n/1e3).toFixed(2)+'K';return n.toFixed(2);}

}

// PERF FIX: track RAF IDs to prevent multiple loops
var _particleRafIds = {};
var _particleResizeFns = {};
function initParticles(cvId){
  var cv=$(cvId);if(!cv)return;
  if(_particleRafIds[cvId])cancelAnimationFrame(_particleRafIds[cvId]);
  if(_particleResizeFns[cvId])window.removeEventListener('resize',_particleResizeFns[cvId]);
  var ctx=cv.getContext('2d');
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  resize();
  _particleResizeFns[cvId]=resize;
  window.addEventListener('resize',resize);
  // Star palette: blue, purple, gold, white
  var COLS=['rgba(91,155,255,','rgba(155,109,255,','rgba(245,200,66,','rgba(255,255,255,'];
  var pts=[];
  for(var i=0;i<70;i++){
    var colIdx=Math.floor(Math.random()*COLS.length);
    pts.push({
      x:Math.random()*cv.width,y:Math.random()*cv.height,
      vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,
      r:Math.random()*1.8+0.4,
      col:COLS[colIdx],
      pulse:Math.random()*Math.PI*2,// phase offset for twinkling
      pSpeed:Math.random()*0.04+0.01,
      alpha:Math.random()*0.5+0.3,
      // Some stars have "tails" (shooting stars)
      isStar:Math.random()>0.75
    });
  }
  // Shooting star state
  var shooters=[];
  var active=true;
  cv._particleStop=function(){active=false;if(_particleRafIds[cvId])cancelAnimationFrame(_particleRafIds[cvId]);window.removeEventListener('resize',resize);};
  var t=0;
  function draw(){
    if(!active)return;
    t+=0.016;
    ctx.clearRect(0,0,cv.width,cv.height);
    // Rarely spawn a shooting star
    if(Math.random()<0.003&&shooters.length<3){
      shooters.push({x:-20,y:Math.random()*cv.height*0.6,vx:8+Math.random()*4,vy:2+Math.random()*3,life:1});
    }
    // Draw shooting stars
    shooters=shooters.filter(function(s){
      s.x+=s.vx;s.y+=s.vy;s.life-=0.04;
      if(s.life<=0||s.x>cv.width)return false;
      ctx.save();
      var grad=ctx.createLinearGradient(s.x-60,s.y-15,s.x,s.y);
      grad.addColorStop(0,'rgba(255,255,255,0)');
      grad.addColorStop(1,'rgba(255,255,255,'+s.life.toFixed(2)+')');
      ctx.strokeStyle=grad;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(s.x-60,s.y-15);ctx.lineTo(s.x,s.y);
      ctx.stroke();ctx.restore();
      return true;
    });
    // Move + draw particles
    pts.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>cv.width)p.vx*=-1;
      if(p.y<0||p.y>cv.height)p.vy*=-1;
      p.pulse+=p.pSpeed;
      var tw=p.alpha*(0.6+Math.sin(p.pulse)*0.4); // twinkle
      // Draw star shape for bigger particles, dot for small
      if(p.isStar&&p.r>1.2){
        // 4-point star
        ctx.save();
        ctx.translate(p.x,p.y);ctx.rotate(p.pulse*0.2);
        ctx.beginPath();
        var rs=p.r*2.2,ri=p.r*0.8;
        for(var j=0;j<8;j++){
          var ang=j*Math.PI/4,r2=j%2===0?rs:ri;
          if(j===0)ctx.moveTo(Math.cos(ang)*r2,Math.sin(ang)*r2);
          else ctx.lineTo(Math.cos(ang)*r2,Math.sin(ang)*r2);
        }
        ctx.closePath();
        ctx.fillStyle=p.col+tw.toFixed(2)+')';
        ctx.shadowColor=p.col+'0.8)';ctx.shadowBlur=p.r*4;
        ctx.fill();ctx.restore();
      } else {
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);
        ctx.fillStyle=p.col+tw.toFixed(2)+')';
        ctx.shadowColor=p.col+'0.6)';ctx.shadowBlur=p.r*3;
        ctx.fill();ctx.shadowBlur=0;
      }
    });
    // Constellation lines
    for(var i=0;i<pts.length;i++){
      for(var j=i+1;j<pts.length;j++){
        var p=pts[i],q=pts[j];
        var d=Math.hypot(p.x-q.x,p.y-q.y);
        if(d<110){
          var a=(0.15*(1-d/110));
          ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);
          // Match color to first particle
          ctx.strokeStyle=p.col+a.toFixed(3)+')';
          ctx.lineWidth=0.5;ctx.stroke();
        }
      }
    }
    _particleRafIds[cvId]=requestAnimationFrame(draw);
  }
  _particleRafIds[cvId]=requestAnimationFrame(draw);
}

function updateHdr(){

  (function(){
    var hb=$('hbal');if(!hb)return;
    var target=G.bal||0;
    var current=parseFloat((hb.textContent||'0').replace('$','').replace(/,/g,''))||0;

    if(Math.abs(diff)<0.01){hb.textContent='$'+target.toFixed(2);return;}
    if(Math.abs(diff)>1000){hb.textContent='$'+target.toFixed(2);return;}// skip anim for big jumps
    var s=0,n=10;var t=setInterval(function(){

  var lv=G.level||1,nxt=Math.min(lv+1,30),xp=G.xp||0;
  var curFloor=XP_TABLE[lv]||0,nxtCeil=XP_TABLE[nxt]||100000;
  var span=nxtCeil-curFloor;var prog=xp-curFloor;
  var pct=(lv>=30)?100:(span>0?Math.min(100,Math.max(0,(prog/span)*100)):100);
  if($('xpf'))$('xpf').style.width=pct+'%';
  if($('h-zenz-hdr'))$('h-zenz-hdr').textContent=(G.zenz||0);
  // Total balance = USD + crypto + ZENZ
  if($('h-bal2'))$('h-bal2').textContent='$'+totalBal.toFixed(2);
  // Also update home page balance display
  if($('h-bal'))$('h-bal').textContent=totalBal.toFixed(2);
}

// ── calcTotalBalance ─────────────────────────────────────────
function calcTotalBalance(){
  var total = G.bal || 0;
  // Add ZENZ value
  total += (G.zenz || 0) * 0.05;
  // Add all crypto asset holdings at current market price
  var assets = G.assets || {};
  Object.keys(assets).forEach(function(sym){
    var amt = parseFloat(assets[sym]) || 0;
    if(amt <= 0) return;
    var price = PRICES[sym] || 0;
    total += amt * price;
  });
  return total;
}

      if(!snap.exists)return;var d=snap.data();
      Object.keys(d).forEach(function(k){
        if(k.startsWith('prices.')){var sym=k.replace('prices.','');PRICES[sym]=d[k];if(_simState[sym])_simState[sym].price=d[k];}
        else if(k.startsWith('priceChg.')){var sym=k.replace('priceChg.','');PRICE_CHG[sym]=d[k];}
      });
    }).catch(function(){});
  }
}

function _simTick(){
  _initSimState();
  COIN_LIST.forEach(function(sym){
    var s=_simState[sym];if(!s)return;
    var vol=SIM_VOL[sym]||0.001;
    var anchor=s.anchor;

    // Randomly change trend direction (~every 20-80 ticks)
    s.trendTimer--;
    if(s.trendTimer<=0){
      s.trend=(Math.random()-0.5)*0.4; // new trend -0.2 to +0.2
      s.trendTimer=20+Math.floor(Math.random()*60);
    }

    // Mean reversion: pull price back toward anchor slowly
    var dist=(anchor-s.price)/anchor;
    var revert=dist*0.0008; // gentle pull

    // Price change = noise + trend + reversion
    var noise=(Math.random()-0.5)*vol*2;
    var delta=s.price*(noise+s.trend*0.0003+revert);
    s.price=Math.max(s.price+delta, anchor*0.05); // can't go below 5% of anchor

    // Clamp: max 5x anchor (500% pump cap over time)
    s.price=Math.min(s.price, anchor*5);

    PRICES[sym]=parseFloat(s.price.toFixed(sym==='SHIB'?10:sym==='XRP'||sym==='MATIC'||sym==='ADA'||sym==='DOGE'?6:2));
    PRICE_CHG[sym]=parseFloat(((s.price-anchor)/anchor*100).toFixed(2));
  });
  // Custom tokens
  Object.keys(_customPrices||{}).forEach(function(sym){
    var cp=_customPrices[sym];if(!cp)return;
    var change=(Math.random()-0.499)*cp.price*0.003;
    cp.price=Math.max(cp.price+change,0.000001);
    cp.chg24h=((cp.price-(cp.initialPrice||cp.price))/Math.max(cp.initialPrice||cp.price,0.000001))*100;
  });
  updateTicker();
  renderHomePrices();
  updateTradePriceDisplay();
  if(_mktCurrentTab)renderMktQuiet();
  // Push custom token prices into chartData so chart doesn't go flat
  Object.keys(_customPrices||{}).forEach(function(sym){
    var cp=_customPrices[sym];if(!cp)return;
    if(!_chartData[sym])_chartData[sym]=[];
    _chartData[sym].push(cp.price);
    if(_chartData[sym].length>60)_chartData[sym].shift();
  });
  // Push live coin prices to chartData
  COIN_LIST.forEach(function(sym){
    if(!_chartData[sym])_chartData[sym]=[];
    var pr=PRICES[sym];if(!pr)return;
    _chartData[sym].push(pr);
    if(_chartData[sym].length>60)_chartData[sym].shift();
  });
}

function renderMkt(){
  var el=$('mkt-list');if(!el)return;
  var q=(($('mkt-q')?$('mkt-q').value:'')||'').toLowerCase().trim();
  var allCoins=COIN_LIST.map(function(sym){
    return {sym:sym,coin:COINS[sym],price:PRICES[sym]||0,chg:PRICE_CHG[sym]||0};
  });
  // Add custom forged tokens
  Object.keys(_customPrices).forEach(function(sym){
    var cp=_customPrices[sym];
    allCoins.push({sym:sym,coin:{n:cp.name,i:cp.ico||'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8m-3-4h6"/></svg>',c:cp.color||'#888',bg:'rgba(128,128,128,.1)',chain:cp.chain||'ZNQ'},price:cp.price,chg:cp.chg24h||0,custom:true});
  });
  if(q)allCoins=allCoins.filter(function(c){return c.sym.toLowerCase().includes(q)||c.coin.n.toLowerCase().includes(q);});
  var sorted=allCoins.slice();
  if(_mktSort==='up')sorted.sort(function(a,b){return b.chg-a.chg;});
  else if(_mktSort==='dn')sorted.sort(function(a,b){return a.chg-b.chg;});
  else if(_mktSort==='custom')sorted=sorted.filter(function(c){return c.custom;});
  else if(_mktSort==='trending')sorted.sort(function(a,b){return Math.abs(b.chg)-Math.abs(a.chg);});
  var h='';
  sorted.forEach(function(c){
    var up=c.chg>=0;
    var ps=c.price>=1?'$'+c.price.toFixed(2):(c.price>=0.01?'$'+c.price.toFixed(4):'$'+c.price.toFixed(8));
    var _mktClick=c.custom?
      'openTokenDetail(\''+((_customPrices[c.sym]&&_customPrices[c.sym].tokenId)||'_noId')+'\',\''+esc(c.sym)+'\')':
      'openStdCoinDetail(\''+esc(c.sym)+'\')';
    h+='<div class="mkt-row" data-sym="'+esc(c.sym)+'" onclick="'+_mktClick+'">'+
      '<div class="mc-ico" style="background:'+c.coin.bg+';color:'+c.coin.c+'">'+c.coin.i+'</div>'+
      '<div class="mc-info"><div class="mc-sym">'+esc(c.sym)+'</div><div class="mc-name">'+esc(c.coin.n)+'</div><div class="mc-chain">'+esc(c.coin.chain)+'</div></div>'+
      '<div class="mc-right"><div class="mc-price">'+ps+'</div>'+
      '<div class="mc-chg '+(up?'chg-up':'chg-dn')+'">'+(up?'+':'')+c.chg.toFixed(2)+'%</div></div>'+
      '</div>';
  });
  el.innerHTML=h||'<div class="empty">No coins found</div>';
}

}

function save(data){if(!G.uid||G.isGuest)return;_sb.from('profiles').update(data).eq('id',G.uid).catch(function(e){});}

function updateHdr(){
  var totalBal = calcTotalBalance();
  (function(){
    var hb=$('hbal');if(!hb)return;
    var target=G.bal||0;
    var current=parseFloat((hb.textContent||'0').replace('$','').replace(/,/g,''))||0;
    var diff=target-current;
    if(Math.abs(diff)<0.01){hb.textContent='$'+target.toFixed(2);return;}
    if(Math.abs(diff)>1000){hb.textContent='$'+target.toFixed(2);return;}// skip anim for big jumps
    var s=0,n=10;var t=setInterval(function(){
      s++;var p=1-Math.pow(1-s/n,3);
      hb.textContent='$'+(current+diff*p).toFixed(2);
      if(s>=n){clearInterval(t);hb.textContent='$'+target.toFixed(2);}
    },20);
  })();
  if($('hlv'))$('hlv').textContent='LV'+(G.level||1);
  var lv=G.level||1,nxt=Math.min(lv+1,30),xp=G.xp||0;
  var curFloor=XP_TABLE[lv]||0,nxtCeil=XP_TABLE[nxt]||100000;
  var span=nxtCeil-curFloor;var prog=xp-curFloor;
  var pct=(lv>=30)?100:(span>0?Math.min(100,Math.max(0,(prog/span)*100)):100);
  if($('xpf'))$('xpf').style.width=pct+'%';
  if($('h-zenz-hdr'))$('h-zenz-hdr').textContent=(G.zenz||0);
  // Total balance = USD + crypto + ZENZ
  if($('h-bal2'))$('h-bal2').textContent='$'+totalBal.toFixed(2);
  // Also update home page balance display
  if($('h-bal'))$('h-bal').textContent=totalBal.toFixed(2);
}

function calcTotalBalance(){
  var total = G.bal || 0;
  // Add ZENZ value
  total += (G.zenz || 0) * 0.05;
  // Add all crypto asset holdings at current market price
  var assets = G.assets || {};
  Object.keys(assets).forEach(function(sym){
    var amt = parseFloat(assets[sym]) || 0;
    if(amt <= 0) return;
    var price = PRICES[sym] || 0;
    total += amt * price;
  });
  return total;
}

function formatPrice(p){
  if(p>=1)return '$'+p.toFixed(2);
  if(p>=0.01)return '$'+p.toFixed(4);
  if(p>=0.0001)return '$'+p.toFixed(6);
  return '$'+p.toFixed(8);
}

function startLivePrices(){
  _initSimState();
  setInterval(_simTick,2500);
  // Admin price overrides from Firebase
  if(typeof db!=='undefined'){
    db.collection('config').doc('marketPrices').get().then(function(snap){
      if(!snap.exists)return;var d=snap.data();
      Object.keys(d).forEach(function(k){
        if(k.startsWith('prices.')){var sym=k.replace('prices.','');PRICES[sym]=d[k];if(_simState[sym])_simState[sym].price=d[k];}
        else if(k.startsWith('priceChg.')){var sym=k.replace('priceChg.','');PRICE_CHG[sym]=d[k];}
      });
    }).catch(function(){});
  }
}

function isAdmin(){
  // Double-check: verify uid matches frozen array
  return !!(G.uid && typeof ADMIN_UIDS!=='undefined' && ADMIN_UIDS.includes(G.uid));
}

function _rl(key,ms){
  var now=Date.now(),last=_rlMap[key]||0;
  if(now-last<ms){return false;}
  _rlMap[key]=now;return true;
}
(function(){
  ZCS.restore();
  var _done=false;
  auth.onAuthStateChanged(function(user){
    if(_done)return;_done=true;
    if(user)G.uid=user.uid;
    if(G.uid&&!G.isGuest){
      db.collection('players').doc(G.uid).get()
        .then(function(snap){if(snap.exists)Object.assign(G,snap.data());boot();})
        .catch(boot);
    }else{boot();}
  });
  setTimeout(function(){if(!_done){_done=true;boot();}},4000);
  function boot(){
    try{updateHdr&&updateHdr();}catch(e){}
    try{startLivePrices&&startLivePrices();}catch(e){}
    try{renderClanContent&&renderClanContent();}catch(e){console.warn('[ZC clans]',e);}
  }
})();
